# ============================================================
# Clawbox — OpenClaw (Personal Assistant)
# Imagem oficial: ghcr.io/openclaw/openclaw
# Gateway + Control UI + CLI + Proxy (nginx)
# ============================================================
#
# Uso:
#   docker compose -p clawbox up -d          # sobe o gateway + proxy
#   docker compose -p clawbox run --rm openclaw-cli onboard
#   docker compose -p clawbox down
#
# Depende de: 9router (saudável) — inicie providers/ primeiro
# Env: .env
#
# Acessos:
#   Clawbox (recomendado):   http://127.0.0.1:${OPENCLAW_PROXY_PORT:-8080}
#     Basic auth + proxy para o gateway. Entre o token na UI.
#   Gateway (direto):        http://127.0.0.1:${OPENCLAW_PORT:-18789}
#     Sem basic auth, útil para health checks e troubleshooting.
#
# Credenciais do proxy:
#   OPENCLAW_AUTH_USERNAME (default: admin)
#   OPENCLAW_AUTH_PASSWORD (definir no .env)
#
# Gateway token:
#   docker compose -p clawbox exec openclaw \
#     sh -c "cat /home/node/.openclaw/openclaw.json | grep -o '\"token\": \"[^\"]*\"'"
# ============================================================

services:
  # ──────────────────────────────────────────────
  # OpenClaw — Gateway do assistente pessoal
  # Imagem oficial: ghcr.io/openclaw/openclaw
  # Control UI própria em http://127.0.0.1:18789 (auth por token)
  # Estado persistente em /home/node/.openclaw — nunca efêmero
  # ──────────────────────────────────────────────
  openclaw:
    image: ghcr.io/openclaw/openclaw:${OPENCLAW_TAG:-latest}
    container_name: clawbox-openclaw
    restart: unless-stopped
    pull_policy: missing
    command:
      [
        "node",
        "openclaw.mjs",
        "gateway",
        "--allow-unconfigured",
        "--bind",
        "lan",
      ]
    env_file: .env
    volumes:
      - openclaw-state:/home/node/.openclaw
      - ./openclaw-workspace:/home/node/.openclaw/workspace
    environment:
      - PUID=${OPENCLAW_UID:-1000}
      - PGID=${OPENCLAW_GID:-1000}
    ports:
      - "127.0.0.1:${OPENCLAW_PORT:-18789}:18789"
    networks:
      - clawbox-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # OpenClaw CLI — não sobe com "up -d" (profile "cli").
  # Uso: docker compose -p clawbox run --rm openclaw-cli <comando>
  # Ex.: onboard | channels add --channel telegram --token "<t>"
  #      | pairing approve telegram <CODE> | dashboard --no-open
  # ──────────────────────────────────────────────
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:${OPENCLAW_TAG:-latest}
    container_name: clawbox-openclaw-cli
    profiles: ["cli"]
    env_file: .env
    volumes:
      - openclaw-state:/home/node/.openclaw
      - ./openclaw-workspace:/home/node/.openclaw/workspace
    environment:
      - PUID=${OPENCLAW_UID:-1000}
      - PGID=${OPENCLAW_GID:-1000}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
    networks:
      - clawbox-net
    entrypoint: ["openclaw"]

  # ──────────────────────────────────────────────
  # OpenClaw Proxy — Nginx sidecar com basic auth
  # Acesso recomendado: http://127.0.0.1:8080
  # Credenciais: admin / OPENCLAW_AUTH_PASSWORD
  # ──────────────────────────────────────────────
  openclaw-proxy:
    image: nginx:alpine
    container_name: clawbox-openclaw-proxy
    restart: unless-stopped
    pull_policy: missing
    ports:
      - "127.0.0.1:${OPENCLAW_PROXY_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/entrypoint.sh:/docker-entrypoint.d/20-auth.sh:ro
    environment:
      - OPENCLAW_AUTH_USERNAME=${OPENCLAW_AUTH_USERNAME:-admin}
      - OPENCLAW_AUTH_PASSWORD=${OPENCLAW_AUTH_PASSWORD:-}
    networks:
      - clawbox-net
    depends_on:
      - openclaw
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  clawbox-net:
    name: clawbox-net
    external: true

volumes:
  openclaw-state:
    name: clawbox-openclaw-state
