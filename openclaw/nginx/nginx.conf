# ============================================================
# OpenClaw — Nginx Proxy
# Proxy reverso com autenticação básica para o gateway.
# Gera .htpasswd de OPENCLAW_AUTH_USERNAME/PASSWORD.
# ============================================================

upstream openclaw_backend {
    server openclaw:18789;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    auth_basic "Clawbox — OpenClaw Gateway";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── Health check ──────────────────────────────────
    location /healthz {
        auth_basic off;
        proxy_pass http://openclaw_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── API + WebSocket (Control UI) ──────────────────
    location / {
        proxy_pass http://openclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket suporte
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts generosos para WS
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
