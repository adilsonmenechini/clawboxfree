# ============================================================
# Clawbox — Providers (Core Infrastructure)
# 9Router + Headroom + Docker-in-Docker
# ============================================================
#
# Uso:
#   docker compose -p clawbox up -d
#   docker compose -p clawbox down
#
# Acessos:
#   9Router API:        http://localhost:20128/v1
#   9Router Dashboard:  http://localhost:20128/dashboard
#
# Env: .env-9router
# ============================================================

services:
  # ──────────────────────────────────────────────
  # 9Router — Free AI API Gateway
  # API:       http://localhost:20128/v1
  # Dashboard: http://localhost:20128/dashboard
  # ──────────────────────────────────────────────
  9router:
    image: decolua/9router:${NINEROUTER_TAG:-latest}
    container_name: clawbox-9router
    restart: unless-stopped
    pull_policy: missing
    env_file: .env
    depends_on:
      headroom:
        condition: service_healthy
    ports:
      - "${ROUTER_PORT:-20128}:20128"
    volumes:
      - 9router-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - HEADROOM_URL=http://headroom:8787
      - PORT=20128
      - HOSTNAME=0.0.0.0
    networks:
      - clawbox-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:20128/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # Headroom — Rate limiter / guard para o 9Router
  # Uso interno, bind em loopback.
  # ──────────────────────────────────────────────
  headroom:
    image: ghcr.io/chopratejas/headroom:${HEADROOM_TAG:-latest}
    container_name: clawbox-headroom
    restart: unless-stopped
    pull_policy: missing
    ports:
      - "127.0.0.1:8787:8787"
    networks:
      - clawbox-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # Docker-in-Docker — sandbox de execução do Hermes
  # ⚠️  Sem TLS. NÃO publicar a porta 2375 no host.
  # ──────────────────────────────────────────────
  dind:
    image: docker:dind
    container_name: clawbox-dind
    restart: unless-stopped
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - dind-data:/var/lib/docker
    networks:
      - clawbox-net
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  clawbox-net:
    name: clawbox-net
    driver: bridge

volumes:
  9router-data:
    name: clawbox-9router-data
  dind-data:
    name: clawbox-dind-data
